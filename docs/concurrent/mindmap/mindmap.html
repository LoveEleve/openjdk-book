<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Java并发编程思维导图</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; }
    html, body { height: 100%; background: transparent; }
    #mindmap { width: 100%; height: 100%; }
    .toolbar {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      gap: 8px;
    }
    .toolbar button {
      padding: 6px 14px;
      background: #42b983;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar button:hover { background: #3aa876; }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 16px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="fit()">适应屏幕</button>
    <button onclick="toggleAll(true)">全部展开</button>
    <button onclick="toggleAll(false)">全部折叠</button>
  </div>
  <div class="loading" id="loading">正在加载思维导图...</div>
  <svg id="mindmap"></svg>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4/dist/browser/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4/dist/browser/index.js"></script>
  <script>
    function init() {
      if (typeof markmap === 'undefined' || typeof d3 === 'undefined') {
        setTimeout(init, 100);
        return;
      }

      var Transformer = markmap.Transformer;
      var Markmap = markmap.Markmap;

      fetch('java-concurrency-mindmap-data.md')
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(function(content) {
          document.getElementById('loading').style.display = 'none';
          var transformer = new Transformer();
          var result = transformer.transform(content);
          var mm = Markmap.create('#mindmap', null, result.root);
          mm.fit();
          window._mm = mm;
        })
        .catch(function(err) {
          document.getElementById('loading').textContent = '加载失败: ' + err.message;
          console.error(err);
        });
    }
    init();

    function fit() { if (window._mm) window._mm.fit(); }
    function toggleAll(expand) {
      if (!window._mm) return;
      var data = window._mm.state.data;
      (function toggle(node) {
        node.payload = node.payload || {};
        node.payload.fold = expand ? 0 : 1;
        if (node.children) node.children.forEach(toggle);
      })(data);
      window._mm.setData(data);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>LoveEleve's Tech Blog</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <meta name="referrer" content="no-referrer" />

  <!-- CDN 样式基座 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" />

  <!-- 公共样式 -->
  <link rel="stylesheet" href="/assets/common.css" />

  <!-- docs 页面特有样式 -->
  <style>
    /* ===== 霞鹜文楷字体覆盖 ===== */
    :root {
      --body-font: "LXGW WenKai", "PingFang SC", "Microsoft YaHei", sans-serif;
      --code-font: "Andale Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --min-font: "LXGW WenKai", "PingFang SC", "Microsoft YaHei", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans GB", "Noto Sans CJK SC", "Noto Sans", Arial, "Apple Color Emoji", "Segoe UI Emoji";
      --min-mono: "Andale Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    body { font-family: var(--body-font) !important; }
    .sidebar { font-family: var(--body-font) !important; }
    code, pre, .token { font-family: var(--code-font) !important; }

    /* ===== 侧边栏箭头统一 ===== */
    .sidebar-nav .folder-button,
    .sidebar-nav .folder-button::before,
    .sidebar-nav .folder-button::after,
    .sidebar-nav li::before,
    .sidebar-nav li::after,
    .sidebar-nav a::before,
    .sidebar-nav a::after { display: none !important; }

    /* 干掉 docsify-themeable 的 background-image 渐变双箭头 */
    .sidebar-nav li > a[href^="/"]:not([href*="?id="]),
    .sidebar-nav li > a[href^="#/"]:not([href*="?id="]) {
      background: none !important;
    }

    .sidebar-nav > ul > li:has(ul) > a,
    .sidebar-nav > ul > li:has(ul):not(:has(a)) {
      position: relative !important;
      padding-left: 18px !important;
    }
    .sidebar-nav > ul > li:has(ul) > a::before,
    .sidebar-nav > ul > li:has(ul):not(:has(a))::before {
      display: block !important;          /* ← P0 修复 */
      content: "▶" !important;
      position: absolute !important;
      left: 0 !important;
      top: 50% !important;
      transform: translateY(-50%) !important;
      font-size: 10px !important;
      color: #666 !important;
      width: 12px !important;
      text-align: center !important;
    }

    /* 暗色模式下箭头颜色 */
    html[data-theme="dark"] .sidebar-nav > ul > li:has(ul) > a::before,
    html[data-theme="dark"] .sidebar-nav > ul > li:has(ul):not(:has(a))::before {
      color: rgba(226, 232, 240, 0.55) !important;  /* ← P1 修复 */
    }

    /* ===== Hero 区域 ===== */
    .hero-section {
      margin: -20px -24px 32px;
      padding: 48px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      text-align: center;
      color: #fff;
    }
    html[data-theme="dark"] .hero-section { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    .hero-content { max-width: 600px; margin: 0 auto; }
    .hero-title { font-size: 36px; font-weight: 800; margin: 0 0 12px; letter-spacing: -0.02em; color: #fff; }
    .hero-slogan { font-size: 18px; font-weight: 600; margin: 0 0 8px; opacity: 0.95; color: #fff; }
    .hero-desc { font-size: 14px; margin: 0 0 24px; opacity: 0.8; color: #fff; }
    .hero-social { display: flex; justify-content: center; gap: 16px; }
    .social-link {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.15); color: #fff; transition: all 0.2s ease;
    }
    .social-link:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }
    html[data-theme="dark"] .social-link { background: rgba(255,255,255,0.08); }
    html[data-theme="dark"] .social-link:hover { background: rgba(255,255,255,0.15); }

    /* ===== 首页隐藏 TOC ===== */
    body[data-page="home"] .toc-aside,
    body[data-page="home"] .toc-fab,
    body[data-page="home"] #toc-aside,
    body[data-page="home"] #toc-fab { display: none !important; }

    /* ===== 持续更新徽章 ===== */
    .update-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
      border: 1px solid rgba(102,126,234,0.2); border-radius: 999px;
      font-size: 13px; color: #667eea; margin: 16px 0;
    }
    html[data-theme="dark"] .update-badge {
      background: linear-gradient(135deg, rgba(102,126,234,0.15), rgba(118,75,162,0.15));
      border-color: rgba(102,126,234,0.3); color: #8b9dc3;
    }
    .update-badge .update-icon { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    /* ===== 首页专栏折叠列表 ===== */
    .home-sections { margin: 24px 0; }
    .home-section { margin: 12px 0; border: 1px solid var(--min-border); border-radius: 10px; overflow: hidden; background: var(--min-surface); }
    html[data-theme="dark"] .home-section { border-color: rgba(255,255,255,0.1); background: rgba(15,23,42,0.5); }
    .home-section summary { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; list-style: none; user-select: none; transition: background 0.15s ease; }
    .home-section summary:hover { background: rgba(0,0,0,0.02); }
    html[data-theme="dark"] .home-section summary:hover { background: rgba(255,255,255,0.03); }
    .home-section summary::-webkit-details-marker { display: none; }
    .home-section summary::before { content: "▶"; font-size: 10px; margin-right: 10px; color: var(--min-subtext); transition: transform 0.2s ease; display: inline-block; }
    .home-section[open] summary::before { transform: rotate(90deg); }
    .home-section .section-title { font-size: 16px; font-weight: 700; color: var(--min-text); flex: 1; }
    .home-section .section-count { font-size: 12px; color: var(--min-subtext); background: rgba(0,0,0,0.04); padding: 3px 10px; border-radius: 999px; margin-left: 12px; }
    html[data-theme="dark"] .home-section .section-count { background: rgba(255,255,255,0.08); }
    .home-section .section-content { padding: 0 18px 16px 42px; border-top: 1px solid var(--min-border); }
    html[data-theme="dark"] .home-section .section-content { border-top-color: rgba(255,255,255,0.08); }
    .home-section .section-content ul { margin: 12px 0 0; padding-left: 0; list-style: none; }
    .home-section .section-content li { margin: 8px 0; padding-left: 16px; position: relative; }
    .home-section .section-content li::before { content: "•"; position: absolute; left: 0; color: var(--theme-color); }

    /* ===== Docs 特有代码块风格（扁平化，无三色点） ===== */
    pre[data-lang] {
      background: #fafafa !important;
      border: 1px solid #e8e8e8 !important;
      border-left: 4px solid var(--theme-color, #42b983) !important;
      border-radius: 6px !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04) !important;
      padding: 2.8em 0 0 !important;
      overflow: hidden;
      margin: 1.5em 0 !important;
    }
    html[data-theme="dark"] pre[data-lang] {
      background: #1a1a2e !important;
      border-color: #2d2d44 !important;
      border-left-color: var(--theme-color, #42b983) !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3) !important;
    }
    pre[data-lang] code { background: transparent; border: 0; padding: 0; }
    .fold-wrap { background: transparent !important; }
    .fold-gutter { border-right-color: rgba(0,0,0,0.06) !important; background: rgba(0,0,0,0.02) !important; }
    html[data-theme="dark"] .fold-gutter { border-right-color: rgba(255,255,255,0.08) !important; background: rgba(255,255,255,0.02) !important; }

    /* 代码工具栏：扁平化 */
    .code-tools {
      background: transparent !important;
      border-bottom: 1px solid rgba(0,0,0,0.06) !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      height: 2.6em !important;
      padding: 0 12px !important;
    }
    html[data-theme="dark"] .code-tools { background: transparent !important; border-bottom-color: rgba(255,255,255,0.08) !important; }
    .code-tools-left { color: #666 !important; font-weight: 600; font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; font-family: var(--code-font); }
    html[data-theme="dark"] .code-tools-left { color: #888 !important; }
    .code-tools-left .dot { display: none !important; }
    .tool-btn {
      color: #555; border: 1px solid #ddd; background: #fff;
      border-radius: 4px; padding: 3px 10px; font-size: 11px; font-weight: 500; transition: all 0.15s ease;
    }
    html[data-theme="dark"] .tool-btn { color: #aaa; border-color: #444; background: #2a2a3e; }
    .tool-btn:hover { background: #f0f0f0; border-color: #ccc; }
    html[data-theme="dark"] .tool-btn:hover { background: #33334a; border-color: #555; }

    /* ===== Draw.io 增强版 ===== */
    .drawio-diagram svg { cursor: zoom-in; }
    .drawio-diagram a { cursor: zoom-in; text-decoration: none; }
    .drawio-zoom-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; padding: 18px;
    }
    .drawio-zoom-content {
      background: rgba(255,255,255,0.96); border-radius: 12px; padding: 10px;
      max-width: 96vw; max-height: 88vh; overflow: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    html[data-theme="dark"] .drawio-zoom-content { background: rgba(15,23,42,0.96); }
    .drawio-wrapper.drawio-only-btn { margin: 10px 0 0; }
    .drawio-edit-row { display: flex; justify-content: center; padding: 0 12px 14px; }
    .drawio-edit-btn {
      position: static; appearance: none; -webkit-appearance: none;
      border: 1px solid rgba(0,0,0,0.10); border-radius: 999px; padding: 8px 14px;
      font-size: 12px; font-weight: 800; letter-spacing: 0.2px; color: rgba(17,24,39,0.92);
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(248,250,252,0.88));
      box-shadow: 0 1px 0 rgba(0,0,0,0.03), 0 10px 22px rgba(0,0,0,0.08);
      display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease;
    }
    .drawio-edit-btn::before {
      content: ""; width: 16px; height: 16px; display: inline-block;
      background: linear-gradient(135deg, rgba(66,185,131,1), rgba(47,129,247,1));
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="black" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25Zm2.92 2.83H5v-.92l9.06-9.06.92.92L5.92 20.08ZM20.71 7.04a1.003 1.003 0 0 0 0-1.42L18.37 3.29a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.83Z"/></svg>') center/contain no-repeat;
    }
    .drawio-edit-btn:hover { transform: translateY(-1px); border-color: rgba(0,0,0,0.16); box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 14px 30px rgba(0,0,0,0.10); background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.92)); }
    .drawio-edit-btn:active { transform: translateY(0); box-shadow: 0 1px 0 rgba(0,0,0,0.03), 0 8px 18px rgba(0,0,0,0.08); }
    html[data-theme="dark"] .drawio-edit-btn { color: rgba(226,232,240,0.92); border-color: rgba(255,255,255,0.12); background: linear-gradient(180deg, rgba(15,23,42,0.70), rgba(15,23,42,0.55)); box-shadow: 0 1px 0 rgba(0,0,0,0.22), 0 18px 38px rgba(0,0,0,0.45); }
    html[data-theme="dark"] .drawio-edit-btn:hover { border-color: rgba(255,255,255,0.18); background: linear-gradient(180deg, rgba(15,23,42,0.78), rgba(15,23,42,0.62)); }

    /* ===== Excalidraw 样式 ===== */
    .excalidraw-wrapper { margin: 16px 0; border-radius: 12px; overflow: hidden; background: #fff; border: 1px solid var(--min-border); }
    .excalidraw-wrapper.excalidraw-only-btn { margin: 10px 0 0; background: transparent; border: none; }
    .excalidraw-preview { width: 100%; min-height: 300px; max-height: 600px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: zoom-in; background: #fff; }
    .excalidraw-preview svg { max-width: 100%; max-height: 100%; height: auto; }
    html[data-theme="dark"] .excalidraw-wrapper { background: rgba(30,41,59,0.5); }
    html[data-theme="dark"] .excalidraw-preview { background: rgba(30,41,59,0.5); }
    .excalidraw-edit-row { display: flex; justify-content: center; padding: 0 12px 14px; gap: 10px; }
    .excalidraw-edit-btn {
      position: static; appearance: none; -webkit-appearance: none;
      border: 1px solid rgba(0,0,0,0.10); border-radius: 999px; padding: 8px 14px;
      font-size: 12px; font-weight: 800; letter-spacing: 0.2px; color: rgba(17,24,39,0.92);
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(248,250,252,0.88));
      box-shadow: 0 1px 0 rgba(0,0,0,0.03), 0 10px 22px rgba(0,0,0,0.08);
      display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease;
    }
    .excalidraw-edit-btn::before {
      content: ""; width: 16px; height: 16px; display: inline-block;
      background: linear-gradient(135deg, #6965db, #a855f7);
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="black" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25Zm2.92 2.83H5v-.92l9.06-9.06.92.92L5.92 20.08ZM20.71 7.04a1.003 1.003 0 0 0 0-1.42L18.37 3.29a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.83Z"/></svg>') center/contain no-repeat;
    }
    .excalidraw-edit-btn:hover { transform: translateY(-1px); border-color: rgba(0,0,0,0.16); box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 14px 30px rgba(0,0,0,0.10); background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.92)); }
    .excalidraw-edit-btn:active { transform: translateY(0); box-shadow: 0 1px 0 rgba(0,0,0,0.03), 0 8px 18px rgba(0,0,0,0.08); }
    html[data-theme="dark"] .excalidraw-edit-btn { color: rgba(226,232,240,0.92); border-color: rgba(255,255,255,0.12); background: linear-gradient(180deg, rgba(15,23,42,0.70), rgba(15,23,42,0.55)); box-shadow: 0 1px 0 rgba(0,0,0,0.22), 0 18px 38px rgba(0,0,0,0.45); }
    html[data-theme="dark"] .excalidraw-edit-btn:hover { border-color: rgba(255,255,255,0.18); background: linear-gradient(180deg, rgba(15,23,42,0.78), rgba(15,23,42,0.62)); }
    .excalidraw-zoom-overlay {
      position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center; cursor: zoom-out;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .excalidraw-zoom-content {
      background: #fff; padding: 24px; border-radius: 16px;
      max-width: 96vw; max-height: 88vh; overflow: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    html[data-theme="dark"] .excalidraw-zoom-content { background: rgba(30,41,59,0.96); }
  </style>
</head>
<body>
  <div id="app">正在加载...</div>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换主题" title="切换主题">
    <span class="theme-icon" aria-hidden="true">⭮</span>
    <span class="theme-text">跟随</span>
  </button>

  <button id="style-toggle" class="style-toggle" type="button" aria-label="切换风格" title="风格：黑白（点击切换）">
    <span class="style-icon" aria-hidden="true">Aa</span>
    <span class="style-text">黑白</span>
  </button>

  <button id="search-toggle" class="search-toggle" type="button" aria-label="全文搜索" title="全文搜索（Ctrl/⌘+K）">
    <span class="search-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
        <path d="M10 18a8 8 0 1 1 5.3-14.1A8 8 0 0 1 10 18Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M21 21l-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </span>
    <span class="search-text">搜索</span>
    <span class="search-hint">Ctrl/⌘+K</span>
  </button>

  <!-- ========== docs 页面专属 hooks（必须在 common.js 前设置） ========== -->
  <script>
    window.__blogHooks = window.__blogHooks || {};

    // 扩展 Draw.io 渲染器（支持 drawio-btn / excalidraw 模式）
    window.__blogHooks.drawioRenderer = function (code, lang, normalized) {
      if (normalized === 'drawio' || normalized === 'drawio-btn' || normalized === 'drawio-button') {
        var xml = (code == null ? '' : String(code)).trim();
        var xmlEnc = encodeURIComponent(xml);
        if (normalized !== 'drawio') {
          return '<div class="drawio-wrapper drawio-only-btn" data-drawio-xml-enc="' + xmlEnc + '"></div>';
        }
        if (window.drawioConverter) {
          return '<div class="drawio-wrapper" data-drawio-xml-enc="' + xmlEnc + '">' + window.drawioConverter(xml) + '</div>';
        }
        return '<pre data-lang="drawio"><code>' + xml + '</code></pre>';
      }
      if (normalized === 'excalidraw' || normalized === 'excalidraw-btn' || normalized === 'excalidraw-button') {
        var jsonStr = (code == null ? '' : String(code)).trim();
        var jsonEnc = encodeURIComponent(jsonStr);
        if (normalized !== 'excalidraw') {
          return '<div class="excalidraw-wrapper excalidraw-only-btn" data-excalidraw-json-enc="' + jsonEnc + '"></div>';
        }
        return '<div class="excalidraw-wrapper" data-excalidraw-json-enc="' + jsonEnc + '"><div class="excalidraw-preview" data-excalidraw-loading="true"><span style="color:#888;font-size:13px;">加载 Excalidraw 预览中...</span></div></div>';
      }
      return undefined;
    };

    // Draw.io / Excalidraw 增强钩子
    window.__blogHooks.afterDoneEach = function (vm, hook) {
      setTimeout(enhanceDrawioElements, 500);
      setTimeout(enhanceExcalidrawElements, 500);
    };
    window.__blogHooks.afterReady = function (vm, hook) {
      setTimeout(enhanceDrawioElements, 1000);
      setTimeout(enhanceExcalidrawElements, 1000);
    };

    // (函数声明被提升，供 afterDoneEach/afterReady 引用)

    function enhanceDrawioElements() {
      // 增强 draw.io SVG 点击缩放
      document.querySelectorAll('.drawio-diagram svg').forEach(function (svg) {
        if (svg.dataset.zoomBound) return;
        svg.dataset.zoomBound = '1';
        svg.style.cursor = 'zoom-in';
        svg.onclick = function (e) {
          if (e.target.closest('.drawio-edit-btn')) return;
          var overlay = document.createElement('div');
          overlay.className = 'drawio-zoom-overlay';
          var content = document.createElement('div');
          content.className = 'drawio-zoom-content';
          content.innerHTML = svg.outerHTML;
          var cloned = content.querySelector('svg');
          if (cloned) { cloned.style.width = '88vw'; cloned.style.height = '80vh'; cloned.style.maxWidth = '88vw'; }
          overlay.appendChild(content);
          overlay.onclick = function () { overlay.remove(); };
          document.addEventListener('keydown', function (ev) { if (ev.key === 'Escape') overlay.remove(); }, { once: true });
          document.body.appendChild(overlay);
        };
      });

      // 增强 drawio 编辑按钮
      document.querySelectorAll('.drawio-wrapper[data-drawio-xml-enc], .drawio-container[data-drawio-xml-enc]').forEach(function (wrapper) {
        var xmlEnc = wrapper.getAttribute('data-drawio-xml-enc');
        if (!xmlEnc) return;
        if (wrapper.querySelector('.drawio-edit-row')) return;

        var btnRow = document.createElement('div');
        btnRow.className = 'drawio-edit-row';
        var editBtn = document.createElement('button');
        editBtn.className = 'drawio-edit-btn';
        editBtn.textContent = '用 Draw.io 编辑';
        editBtn.title = '在 Draw.io 中打开此图表';
        editBtn.onclick = function (e) {
          e.preventDefault(); e.stopPropagation();
          try {
            var xml = decodeURIComponent(xmlEnc);
            var blob = new Blob([xml], { type: 'application/xml' });
            var url = URL.createObjectURL(blob);
            window.open('https://app.diagrams.net/?data=' + encodeURIComponent(blob), '_blank', 'noopener,noreferrer');
            setTimeout(function () { URL.revokeObjectURL(url); }, 60000);
          } catch (err) { alert('打开失败，请重试'); }
        };
        btnRow.appendChild(editBtn);
        var diagram = wrapper.querySelector('.drawio-diagram');
        if (diagram && diagram.nextSibling) { wrapper.insertBefore(btnRow, diagram.nextSibling); }
        else { wrapper.appendChild(btnRow); }
      });

      // 处理 drawio-only-btn 模式
      document.querySelectorAll('.drawio-wrapper.drawio-only-btn[data-drawio-xml-enc]').forEach(function (wrapper) {
        if (wrapper.querySelector('.drawio-edit-row')) return;
        var xmlEnc = wrapper.getAttribute('data-drawio-xml-enc');
        var btnRow = document.createElement('div');
        btnRow.className = 'drawio-edit-row';
        var editBtn = document.createElement('button');
        editBtn.className = 'drawio-edit-btn';
        editBtn.textContent = '用 Draw.io 打开';
        editBtn.title = '在 Draw.io 中打开此图表';
        editBtn.onclick = function (e) {
          e.preventDefault(); e.stopPropagation();
          try {
            var xml = decodeURIComponent(xmlEnc);
            var blob = new Blob([xml], { type: 'application/xml' });
            var url = URL.createObjectURL(blob);
            window.open('https://app.diagrams.net/?data=' + encodeURIComponent(blob), '_blank', 'noopener,noreferrer');
            setTimeout(function () { URL.revokeObjectURL(url); }, 60000);
          } catch (err) { alert('打开失败，请重试'); }
        };
        btnRow.appendChild(editBtn);
        wrapper.appendChild(btnRow);
      });
    }

    /* ---- Excalidraw 增强 ---- */
    function enhanceExcalidrawElements() {
      document.querySelectorAll('.excalidraw-wrapper[data-excalidraw-json-enc]').forEach(function (wrapper) {
        var jsonEnc = wrapper.getAttribute('data-excalidraw-json-enc');
        if (!jsonEnc) return;
        if (wrapper.dataset.excalidrawEnhanced === '1') return;
        wrapper.dataset.excalidrawEnhanced = '1';

        var jsonData;
        try { jsonData = JSON.parse(decodeURIComponent(jsonEnc)); }
        catch (e) { return; }

        var previewEl = wrapper.querySelector('.excalidraw-preview');
        if (previewEl && jsonData && jsonData.elements) {
          var elements = jsonData.elements;
          var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
          elements.forEach(function (el) {
            if (el.isDeleted) return;
            minX = Math.min(minX, el.x || 0);
            minY = Math.min(minY, el.y || 0);
            maxX = Math.max(maxX, (el.x || 0) + (el.width || 0));
            maxY = Math.max(maxY, (el.y || 0) + (el.height || 0));
          });

          if (minX < Infinity) {
            var width = maxX - minX + 40;
            var height = maxY - minY + 40;
            var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-20) + ' ' + (minY-20) + ' ' + width + ' ' + height + '" style="background:#fff;border-radius:8px;">';
            elements.forEach(function (el) {
              if (el.isDeleted) return;
              var s = el.strokeColor || '#000';
              var f = el.backgroundColor || 'transparent';
              var sw = el.strokeWidth || 1;
              if (el.type === 'rectangle') svg += '<rect x="'+el.x+'" y="'+el.y+'" width="'+el.width+'" height="'+el.height+'" stroke="'+s+'" fill="'+f+'" stroke-width="'+sw+'" rx="'+(el.roundness?8:0)+'"/>';
              else if (el.type === 'ellipse') { var cx=el.x+el.width/2,cy=el.y+el.height/2; svg += '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+(el.width/2)+'" ry="'+(el.height/2)+'" stroke="'+s+'" fill="'+f+'" stroke-width="'+sw+'"/>'; }
              else if (el.type === 'diamond') { var cx=el.x+el.width/2,cy=el.y+el.height/2; svg += '<polygon points="'+(el.x+el.width/2)+','+el.y+' '+(el.x+el.width)+','+cy+' '+(el.x+el.width/2)+','+(el.y+el.height)+' '+el.x+','+cy+'" stroke="'+s+'" fill="'+f+'" stroke-width="'+sw+'"/>'; }
              else if (el.type === 'line' || el.type === 'arrow') { var pts=el.points||[[0,0],[el.width||0,el.height||0]],d='M'+(el.x+pts[0][0])+' '+(el.y+pts[0][1]); for(var i=1;i<pts.length;i++) d+=' L'+(el.x+pts[i][0])+' '+(el.y+pts[i][1]); svg+='<path d="'+d+'" stroke="'+s+'" fill="none" stroke-width="'+sw+'"/>'; }
              else if (el.type === 'text') { svg+='<text x="'+el.x+'" y="'+(el.y+(el.fontSize||16))+'" font-size="'+(el.fontSize||16)+'" fill="'+(el.strokeColor||'#000')+'" font-family="Virgil">'+(el.text||'').replace(/</g,'&lt;')+'</text>'; }
            });
            svg += '</svg>';
            previewEl.innerHTML = svg;
            previewEl.onclick = function () {
              var overlay = document.createElement('div');
              overlay.className = 'excalidraw-zoom-overlay';
              var content = document.createElement('div');
              content.className = 'excalidraw-zoom-content';
              content.innerHTML = svg;
              var svgEl = content.querySelector('svg');
              if (svgEl) { svgEl.style.width = '92vw'; svgEl.style.height = '82vh'; }
              overlay.appendChild(content);
              overlay.onclick = function () { overlay.remove(); };
              document.addEventListener('keydown', function (ev) { if (ev.key==='Escape') overlay.remove(); },{once:true});
              document.body.appendChild(overlay);
            };
          } else { previewEl.innerHTML = '<span style="color:#888;font-size:13px;">空白画布</span>'; }
        }

        var btnRow = document.createElement('div');
        btnRow.className = 'excalidraw-edit-row';
        var editBtn = document.createElement('button');
        editBtn.className = 'excalidraw-edit-btn';
        editBtn.textContent = '用 Excalidraw 打开';
        editBtn.title = '在 Excalidraw 在线编辑器中打开此图表';
        editBtn.onclick = function (e) {
          e.preventDefault(); e.stopPropagation();
          var jsonStr = jsonData ? JSON.stringify(jsonData) : decodeURIComponent(jsonEnc);
          navigator.clipboard.writeText(jsonStr).then(function () {
            window.open('https://excalidraw.com/', '_blank', 'noopener,noreferrer');
            alert('图表数据已复制到剪贴板！\n\n请在 Excalidraw 中按 Ctrl+V (Mac: Cmd+V) 粘贴即可加载图表。');
          }).catch(function () {
            try {
              var blob = new Blob([jsonStr], { type: 'application/json' });
              var url = URL.createObjectURL(blob);
              var a = document.createElement('a');
              a.href = url; a.download = 'diagram.excalidraw';
              document.body.appendChild(a); a.click(); document.body.removeChild(a);
              URL.revokeObjectURL(url);
              window.open('https://excalidraw.com/', '_blank', 'noopener,noreferrer');
              alert('文件已下载！请将 diagram.excalidraw 拖入 Excalidraw 窗口打开。');
            } catch (err) { alert('操作失败，请联系站长'); }
          });
        };
        btnRow.appendChild(editBtn);
        var preview = wrapper.querySelector('.excalidraw-preview');
        if (preview && preview.parentNode) { preview.parentNode.insertBefore(btnRow, preview.nextSibling); }
        else { wrapper.appendChild(btnRow); }
      });
    }
  </script>
